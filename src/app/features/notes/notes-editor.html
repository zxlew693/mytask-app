<div class="flex h-full flex-col overflow-hidden">
  @if (!noteService.selectedNoteId()) {
    <div class="flex flex-1 items-center justify-center p-4 text-xs text-slate-400 dark:text-vscode-400">
      Select a note to start editing
    </div>
  } @else if (!hasKey()) {
    <div class="flex flex-1 items-center justify-center p-4 text-xs text-slate-400 dark:text-vscode-400">
      Notes are locked. Log in to view.
    </div>
  } @else {
    <div class="flex shrink-0 items-center justify-between border-b border-slate-200 px-3 py-1.5 dark:border-vscode-600">
      <div class="flex gap-0.5">
        <button
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-xs font-bold transition-colors"
          [class.bg-vscode-accent-500]="isActive('bold')"
          [class.text-white]="isActive('bold')"
          [class.text-slate-500]="!isActive('bold')"
          [class.hover:bg-slate-200]="!isActive('bold')"
          [class.dark:text-vscode-300]="!isActive('bold')"
          [class.dark:hover:bg-vscode-700]="!isActive('bold')"
          (click)="toggleBold()"
          title="Bold"
        >B</button>
        <button
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-xs italic transition-colors"
          [class.bg-vscode-accent-500]="isActive('italic')"
          [class.text-white]="isActive('italic')"
          [class.text-slate-500]="!isActive('italic')"
          [class.hover:bg-slate-200]="!isActive('italic')"
          [class.dark:text-vscode-300]="!isActive('italic')"
          [class.dark:hover:bg-vscode-700]="!isActive('italic')"
          (click)="toggleItalic()"
          title="Italic"
        >I</button>
        <button
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded transition-colors"
          [class.bg-vscode-accent-500]="isActive('bulletList')"
          [class.text-white]="isActive('bulletList')"
          [class.text-slate-500]="!isActive('bulletList')"
          [class.hover:bg-slate-200]="!isActive('bulletList')"
          [class.dark:text-vscode-300]="!isActive('bulletList')"
          [class.dark:hover:bg-vscode-700]="!isActive('bulletList')"
          (click)="toggleBulletList()"
          title="Bullet list"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="9" y1="6" x2="20" y2="6" stroke-linecap="round"/>
            <line x1="9" y1="12" x2="20" y2="12" stroke-linecap="round"/>
            <line x1="9" y1="18" x2="20" y2="18" stroke-linecap="round"/>
            <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <button
          class="flex h-6 w-6 cursor-pointer items-center justify-center rounded transition-colors"
          [class.bg-vscode-accent-500]="isActive('orderedList')"
          [class.text-white]="isActive('orderedList')"
          [class.text-slate-500]="!isActive('orderedList')"
          [class.hover:bg-slate-200]="!isActive('orderedList')"
          [class.dark:text-vscode-300]="!isActive('orderedList')"
          [class.dark:hover:bg-vscode-700]="!isActive('orderedList')"
          (click)="toggleOrderedList()"
          title="Ordered list"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="9" y1="6" x2="20" y2="6" stroke-linecap="round"/>
            <line x1="9" y1="12" x2="20" y2="12" stroke-linecap="round"/>
            <line x1="9" y1="18" x2="20" y2="18" stroke-linecap="round"/>
            <text x="1" y="8" font-size="7" fill="currentColor" stroke="none">1</text>
            <text x="1" y="14" font-size="7" fill="currentColor" stroke="none">2</text>
            <text x="1" y="20" font-size="7" fill="currentColor" stroke="none">3</text>
          </svg>
        </button>
      </div>
      @if (isSaving()) {
        <span class="text-[0.6rem] text-slate-400 dark:text-vscode-500">Saving…</span>
      }
    </div>

    <div
      #editorEl
      class="flex-1 overflow-y-auto px-3 py-2 text-sm text-slate-700 dark:text-vscode-100
             [&_.ProseMirror]:outline-none [&_.ProseMirror]:min-h-full
             [&_.ProseMirror_ul]:list-disc [&_.ProseMirror_ul]:pl-4
             [&_.ProseMirror_ol]:list-decimal [&_.ProseMirror_ol]:pl-4
             [&_.ProseMirror_p]:my-1
             [&_.ProseMirror_strong]:font-bold
             [&_.ProseMirror_em]:italic"
    ></div>
  }
</div>
