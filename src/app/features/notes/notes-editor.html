<div class="notes-quill-editor flex h-full flex-col overflow-hidden">

  <!-- Title row -->
  <div class="flex shrink-0 items-center gap-1.5 border-b border-slate-200 px-3 py-2 dark:border-vscode-600">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 text-slate-400 dark:text-vscode-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
    </svg>
    @if (editingTitle()) {
      <input
        #titleInput
        class="min-w-0 flex-1 rounded border border-vscode-accent-500 bg-white px-1.5 py-0.5 text-sm font-semibold text-slate-700 outline-none dark:bg-vscode-800 dark:text-vscode-100"
        [value]="titleDraft()"
        (input)="titleDraft.set($any($event.target).value)"
        (blur)="commitTitle()"
        (keydown)="onTitleKeydown($event)"
        spellcheck="false"
        autofocus
      />
    } @else {
      <span
        class="min-w-0 flex-1 cursor-text overflow-hidden text-ellipsis whitespace-nowrap rounded px-2 py-0.5 text-sm font-semibold text-slate-800 transition-colors hover:bg-slate-100 hover:text-slate-600 dark:text-vscode-100 dark:hover:bg-vscode-700 dark:hover:text-vscode-300"
        (dblclick)="startEditingTitle()"
        title="Double-click to rename"
      >{{ selectedNote()?.title ?? 'Untitled' }}</span>
    }

    @if (isSaving()) {
      <svg class="h-3.5 w-3.5 shrink-0 animate-spin text-slate-400 dark:text-vscode-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    }
    <button
      class="flex h-6 w-6 shrink-0 cursor-pointer items-center justify-center rounded text-slate-500 transition-colors hover:bg-slate-200 dark:text-vscode-300 dark:hover:bg-vscode-700"
      (click)="exportAsText()"
      title="Export as text file"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
      </svg>
    </button>
  </div>

  <div #editorEl class="notes-quill-mount min-h-0 flex-1"></div>
</div>
