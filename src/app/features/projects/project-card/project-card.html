<div class="mb-4 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-vscode-600 dark:bg-vscode-800" [id]="project().id">
  <div class="flex select-none items-center justify-between border-b border-slate-100 px-5 py-4 dark:border-vscode-600">
    <h2 class="text-lg font-semibold text-slate-800 dark:text-vscode-50">{{ project().name }}</h2>
    <div class="flex items-center gap-1">
      <!-- collapse/expand -->
      <button
        class="flex h-7 w-7 cursor-pointer items-center justify-center rounded-md text-slate-400 transition-colors hover:bg-slate-100 hover:text-slate-700 dark:text-vscode-400 dark:hover:bg-vscode-700 dark:hover:text-vscode-100"
        (click)="isExpanded.update(v => !v)"
        [title]="isExpanded() ? 'Collapse' : 'Expand'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" [class.rotate-180]="isExpanded()" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <!-- delete -->
      <button
        class="flex h-7 w-7 cursor-pointer items-center justify-center rounded-md text-slate-400 transition-colors hover:bg-red-50 hover:text-red-500 dark:text-vscode-400 dark:hover:bg-red-900/30 dark:hover:text-red-400"
        (click)="onDeleteProject()"
        title="Delete project"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
      <!-- close panel -->
      <button
        class="flex h-7 w-7 cursor-pointer items-center justify-center rounded-md text-slate-400 transition-colors hover:bg-slate-100 hover:text-slate-700 dark:text-vscode-400 dark:hover:bg-vscode-700 dark:hover:text-vscode-100"
        (click)="projectService.toggleOpen(project().id)"
        title="Close panel"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  @if (isExpanded()) {
    <div class="flex border-b border-slate-200 bg-slate-50 dark:border-vscode-600 dark:bg-vscode-800">
      <button
        class="flex cursor-pointer items-center gap-1.5 border-b-2 border-transparent bg-transparent px-[18px] py-2.5 text-sm text-slate-500 transition-colors hover:text-slate-800 dark:text-vscode-300 dark:hover:text-vscode-100"
        [class.border-vscode-accent-500]="activeTab() === 'current'"
        [class.text-vscode-accent-400]="activeTab() === 'current'"
        [class.font-medium]="activeTab() === 'current'"
        (click)="activeTab.set('current')"
      >
        Current
        <span
          class="min-w-[18px] rounded-full px-1.5 py-px text-center text-[0.72rem]"
          [class.bg-indigo-100]="activeTab() === 'current'"
          [class.text-indigo-500]="activeTab() === 'current'"
          [class.bg-slate-200]="activeTab() !== 'current'"
          [class.text-slate-500]="activeTab() !== 'current'"
          [class.dark:bg-vscode-accent-500/20]="activeTab() === 'current'"
          [class.dark:text-vscode-accent-300]="activeTab() === 'current'"
          [class.dark:bg-vscode-700]="activeTab() !== 'current'"
          [class.dark:text-vscode-300]="activeTab() !== 'current'"
        >{{ currentTasks().length }}</span>
      </button>
      <button
        class="flex cursor-pointer items-center gap-1.5 border-b-2 border-transparent bg-transparent px-[18px] py-2.5 text-sm text-slate-500 transition-colors hover:text-slate-800 dark:text-vscode-300 dark:hover:text-vscode-100"
        [class.border-vscode-accent-500]="activeTab() === 'completed'"
        [class.text-vscode-accent-400]="activeTab() === 'completed'"
        [class.font-medium]="activeTab() === 'completed'"
        (click)="activeTab.set('completed')"
      >
        Completed
        <span
          class="min-w-[18px] rounded-full px-1.5 py-px text-center text-[0.72rem]"
          [class.bg-indigo-100]="activeTab() === 'completed'"
          [class.text-indigo-500]="activeTab() === 'completed'"
          [class.bg-slate-200]="activeTab() !== 'completed'"
          [class.text-slate-500]="activeTab() !== 'completed'"
          [class.dark:bg-vscode-accent-500/20]="activeTab() === 'completed'"
          [class.dark:text-vscode-accent-300]="activeTab() === 'completed'"
          [class.dark:bg-vscode-700]="activeTab() !== 'completed'"
          [class.dark:text-vscode-300]="activeTab() !== 'completed'"
        >{{ completedTasks().length }}</span>
      </button>
      <button
        class="flex cursor-pointer items-center gap-1.5 border-b-2 border-transparent bg-transparent px-[18px] py-2.5 text-sm text-slate-500 transition-colors hover:text-slate-800 dark:text-vscode-300 dark:hover:text-vscode-100"
        [class.border-vscode-accent-500]="activeTab() === 'cancelled'"
        [class.text-vscode-accent-400]="activeTab() === 'cancelled'"
        [class.font-medium]="activeTab() === 'cancelled'"
        (click)="activeTab.set('cancelled')"
      >
        Cancelled
        <span
          class="min-w-[18px] rounded-full px-1.5 py-px text-center text-[0.72rem]"
          [class.bg-indigo-100]="activeTab() === 'cancelled'"
          [class.text-indigo-500]="activeTab() === 'cancelled'"
          [class.bg-slate-200]="activeTab() !== 'cancelled'"
          [class.text-slate-500]="activeTab() !== 'cancelled'"
          [class.dark:bg-vscode-accent-500/20]="activeTab() === 'cancelled'"
          [class.dark:text-vscode-accent-300]="activeTab() === 'cancelled'"
          [class.dark:bg-vscode-700]="activeTab() !== 'cancelled'"
          [class.dark:text-vscode-300]="activeTab() !== 'cancelled'"
        >{{ cancelledTasks().length }}</span>
      </button>
    </div>

    @if (activeTab() === 'current') {
      <div class="flex gap-2 px-4 pt-3">
        <input
          class="flex-1 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 outline-none transition-colors placeholder:text-slate-400 focus:border-indigo-500 dark:border-vscode-600 dark:bg-vscode-700 dark:text-vscode-100 dark:placeholder:text-vscode-400 dark:focus:border-vscode-accent-500"
          [value]="newTaskTitle()"
          (input)="onTitleChange($event)"
          (keydown)="onKeydown($event)"
          placeholder="New task…"
        />
        <button
          class="cursor-pointer rounded-full bg-vscode-accent-500 px-4 py-2 text-sm text-white transition-colors hover:bg-vscode-accent-600"
          (click)="onAddTask()"
        >Add</button>
      </div>
    }

    <div class="flex min-h-12 flex-col gap-1.5 px-4 py-3">
      @for (task of visibleTasks(); track task.id) {
        <app-task-item [task]="task" />
      } @empty {
        <p class="py-4 text-center text-sm text-slate-400 dark:text-vscode-400">No {{ activeTab() }} tasks</p>
      }
    </div>
  }
</div>
