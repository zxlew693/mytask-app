<div class="flex h-screen flex-col overflow-hidden bg-slate-100 dark:bg-vscode-900" style="font-family: 'Lexend', sans-serif;">
  <header class="flex h-10 shrink-0 cursor-move items-center justify-between bg-slate-200 px-4 dark:bg-vscode-700" style="-webkit-app-region: drag">
    <div class="flex items-center gap-2">
      <img src="logo.png" alt="My Task" class="h-5" />
      <span class="text-xs font-semibold text-slate-500 dark:text-vscode-300">My Task</span>
    </div>
    <div class="flex items-center gap-1" style="-webkit-app-region: no-drag">
      <button
        class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-slate-500 transition-colors hover:bg-slate-300 dark:text-vscode-300 dark:hover:bg-vscode-600 dark:hover:text-vscode-50"
        (click)="sound.toggleMute()"
        [title]="sound.muted() ? 'Unmute sounds' : 'Mute sounds'"
      >
        @if (sound.muted()) {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15z" />
            <line x1="23" y1="9" x2="17" y2="15" stroke-linecap="round" />
            <line x1="17" y1="9" x2="23" y2="15" stroke-linecap="round" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.36 5.64a9 9 0 0 1 0 12.73" />
          </svg>
        }
      </button>
      <button
        class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-slate-500 transition-colors hover:bg-slate-300 dark:text-vscode-300 dark:hover:bg-vscode-600 dark:hover:text-vscode-50"
        (click)="theme.toggle()"
        [title]="theme.isDark() ? 'Switch to light' : 'Switch to dark'"
      ><span class="text-[0.65rem] leading-none">{{ theme.isDark() ? '☀️' : '🌙' }}</span></button>
      <button
        class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-slate-500 transition-colors hover:bg-slate-300 dark:text-vscode-300 dark:hover:bg-vscode-600 dark:hover:text-vscode-50"
        (click)="maximize()"
        [title]="isMaximized() ? 'Restore' : 'Maximize'"
      >
        @if (isMaximized()) {
          <!-- restore-down icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" />
          </svg>
        } @else {
          <!-- maximize icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      </button>
      <button
        class="flex h-6 w-6 cursor-pointer items-center justify-center rounded text-slate-500 transition-colors hover:bg-red-500 hover:text-white dark:text-vscode-300 dark:hover:bg-red-600"
        (click)="close()"
        title="Close"
      >✕</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <app-sidebar [style.width.px]="sidebarWidth()" class="shrink-0" />
    <div
      class="z-10 w-1 cursor-col-resize bg-slate-200 transition-colors hover:bg-indigo-400 dark:bg-vscode-700 dark:hover:bg-vscode-accent-500"
      (mousedown)="onResizeStart($event)"
    ></div>
    <main class="flex flex-1 flex-col overflow-y-auto p-6">
      <app-project-board class="flex flex-1 flex-col" />
    </main>
  </div>
</div>
